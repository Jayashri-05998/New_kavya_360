# Datasource: use MySQL by default; override with env vars if needed.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/kavyaprodb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
 
# Server Port
server.port=${PORT:8080}
 
# CORS Configuration
server.servlet.context-path=/

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:3001,https://kavyaproman.netlify.app}

# SendGrid API key (optional) - set as environment variable SENDGRID_API_KEY in production
sendgrid.api.key=${SENDGRID_API_KEY:}
sendgrid.from.email=${SENDGRID_FROM_EMAIL:kavyalearn.info@gmail.com}
