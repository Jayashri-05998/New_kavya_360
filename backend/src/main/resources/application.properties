# Datasource: use Railway-provided MySQL env vars in deployment; fallback to H2 for local runs.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:kavyaprodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Root@123}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
 
# Server Port
server.port=${PORT:8080}
 
# CORS Configuration
server.servlet.context-path=/
