# Datasource: use Render-provided MySQL env vars in deployment; fallback to H2 for local runs.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:kavyaprodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Root@123}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
 
# Server Port
server.port=${PORT:8080}
 
# CORS Configuration
server.servlet.context-path=/
 